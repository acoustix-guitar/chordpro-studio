<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAB Creator - Standalone</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            min-height: 100vh;
        }
        .tab-creator-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        #tab-creator-ui {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            overflow-x: auto;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .tab-creator-row {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 4px;
        }
        .tab-creator-string-label {
            width: 24px;
            font-size: 14px;
            font-weight: bold;
            color: #1e293b;
            text-align: center;
            font-family: 'Roboto Mono', monospace;
        }
        .tab-creator-cell {
            width: 32px;
            height: 32px;
            border: 1px solid #cbd5e1;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-family: 'Roboto Mono', monospace;
            cursor: pointer;
            user-select: none;
            transition: all 0.1s;
            color: #1e293b;
            border-radius: 4px;
        }
        .tab-creator-cell:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }
        .tab-creator-cell.active {
            background: #2563eb;
            color: white;
            border-color: #1d4ed8;
            font-weight: bold;
        }
        .tab-creator-cell.bar {
            background: #94a3b8;
            border-color: #64748b;
            font-weight: bold;
            color: white;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        #directive-output {
            font-family: 'Roboto Mono', monospace;
            white-space: pre;
            overflow-x: auto;
        }
        #preview-container svg {
            background: transparent;
            padding: 0;
            display: block;
            flex-shrink: 0;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">TAB Creator</h1>
                <p class="text-slate-600 text-sm">Create professional guitar tablature for ChordPro</p>
            </div>
            <a href="chord-pro-studio.html" class="text-slate-900 hover:underline font-bold flex items-center gap-2 text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                </svg>
                Back to Studio
            </a>
        </header>

        <div class="grid grid-cols-1 gap-8">
            <!-- Editor Section -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-slate-900">Editor</h2>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-2">
                            <label class="text-sm font-bold text-slate-600 uppercase">Strings:</label>
                            <select id="string-count" onchange="updateStringCount()" class="border border-slate-200 rounded p-1 text-sm outline-none">
                                <option value="4">4 (Bass/Uke)</option>
                                <option value="5">5 (Banjo)</option>
                                <option value="6" selected>6 (Guitar)</option>
                                <option value="7">7 (Extended)</option>
                                <option value="8">8 (Extended)</option>
                            </select>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="addTabColumn()" class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-sm font-bold transition-colors">+ Column</button>
                            <button onclick="removeTabColumn()" class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-sm font-bold transition-colors">- Column</button>
                            <button onclick="addTabBar()" class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-sm font-bold transition-colors">Add Bar</button>
                            <button onclick="clearTabCreator()" class="px-3 py-1.5 bg-red-50 hover:bg-red-100 text-red-600 rounded-lg text-sm font-bold transition-colors">Clear All</button>
                        </div>
                    </div>
                </div>

                <div class="tab-creator-wrapper mb-6">
                    <button onclick="scrollTab('left')" class="p-2 bg-white border border-slate-200 rounded-full shadow-sm hover:bg-slate-50 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" />
                        </svg>
                    </button>
                    <div id="tab-creator-ui" class="no-scrollbar scroll-smooth">
                        <div class="flex flex-col gap-1 min-w-max" id="tab-grid">
                            <!-- TAB grid will be generated here -->
                        </div>
                    </div>
                    <button onclick="scrollTab('right')" class="p-2 bg-white border border-slate-200 rounded-full shadow-sm hover:bg-slate-50 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>

                <div class="flex items-center justify-center gap-4 text-sm text-slate-500 italic">
                    <div class="flex items-center gap-1">
                        <span class="w-3 h-3 bg-blue-600 rounded-sm"></span>
                        <span>Left-click: Cycle fret (0-24)</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <span class="w-3 h-3 bg-white border border-slate-300 rounded-sm"></span>
                        <span>Right-click: Clear cell</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <span class="w-3 h-3 bg-slate-400 rounded-sm"></span>
                        <span>Bar: Vertical separator</span>
                    </div>
                </div>
            </div>

            <!-- Preview Section -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-slate-900">Graphical Preview</h2>
                        <div class="flex items-center gap-4">
                            <div class="flex items-center gap-2">
                                <label class="text-[12px] font-bold text-slate-600 uppercase">Scale</label>
                                <input type="range" id="tab-scale" min="0.5" max="5" step="0.1" value="1" class="h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600" oninput="updateOutput()">
                                <span id="scale-value" class="text-[10px] font-bold text-slate-400 w-8">1.0</span>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="downloadSVG()" class="p-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg transition-all" title="Download SVG">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                                    </svg>
                                </button>
                                <button onclick="downloadPNG()" class="p-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-all" title="Download PNG">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div id="preview-container" class="flex-1 overflow-auto p-8 bg-slate-50 rounded-xl border border-slate-200 flex justify-center items-start">
                        <!-- SVG will be rendered here -->
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-slate-900">ChordPro Output</h2>
                        <div class="flex gap-2">
                            <button onclick="copyOutput()" class="px-4 py-2 bg-slate-900 hover:bg-slate-800 text-white rounded-xl font-bold flex items-center gap-2 transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                    <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" />
                                    <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z" />
                                </svg>
                                Copy
                            </button>
                            <button onclick="downloadOutput()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold flex items-center gap-2 transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                                </svg>
                                .txt
                            </button>
                        </div>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-xl border border-slate-200 flex-1">
                        <code id="directive-output" class="text-sm text-slate-800 block"></code>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl transform translate-y-24 opacity-0 transition-all duration-300 z-50 pointer-events-none">
        <span id="toast-message"></span>
    </div>

    <script>
        function showToast(message) {
            const toast = document.getElementById('toast');
            const msg = document.getElementById('toast-message');
            msg.innerText = message;
            toast.classList.remove('translate-y-24', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-24', 'opacity-0');
            }, 3000);
        }

        // TAB Creator Logic
        let tabState = Array(6).fill(0).map(() => Array(16).fill('-'));
        let stringLabels = ['E', 'B', 'G', 'D', 'A', 'E'];

        function updateStringCount() {
            const count = parseInt(document.getElementById('string-count').value);
            const cols = tabState[0].length;
            
            // Adjust tabState
            if (tabState.length < count) {
                while (tabState.length < count) {
                    tabState.push(Array(cols).fill('-'));
                }
            } else if (tabState.length > count) {
                tabState = tabState.slice(0, count);
            }

            // Adjust labels
            if (count === 4) stringLabels = ['G', 'D', 'A', 'E'];
            else if (count === 5) stringLabels = ['G', 'D', 'G', 'B', 'D'];
            else if (count === 6) stringLabels = ['E', 'B', 'G', 'D', 'A', 'E'];
            else if (count === 7) stringLabels = ['E', 'B', 'G', 'D', 'A', 'E', 'B'];
            else if (count === 8) stringLabels = ['E', 'B', 'G', 'D', 'A', 'E', 'B', 'F#'];
            else stringLabels = Array(count).fill('S');

            initTabCreator();
        }

        function initTabCreator() {
            const grid = document.getElementById('tab-grid');
            if (!grid) return;
            
            let html = '';
            
            for (let s = 0; s < tabState.length; s++) {
                html += `<div class="tab-creator-row">`;
                html += `<div class="tab-creator-string-label">${stringLabels[s] || 'S'}</div>`;
                for (let c = 0; c < tabState[s].length; c++) {
                    const val = tabState[s][c];
                    const isActive = val !== '-' && val !== '|';
                    const isBar = val === '|';
                    html += `
                        <div class="tab-creator-cell ${isActive ? 'active' : ''} ${isBar ? 'bar' : ''}" 
                             onclick="handleTabCellClick(${s}, ${c})"
                             oncontextmenu="handleTabCellRightClick(event, ${s}, ${c})">
                            ${val === '|' ? '|' : val}
                        </div>
                    `;
                }
                html += `</div>`;
            }
            grid.innerHTML = html;
            updateOutput();
        }

        function handleTabCellClick(s, c) {
            const current = tabState[s][c];
            if (current === '|') return; // Don't cycle bars
            if (current === '-') {
                tabState[s][c] = '0';
            } else {
                let num = parseInt(current);
                if (isNaN(num)) num = 0;
                num = (num + 1) % 25;
                tabState[s][c] = num.toString();
            }
            initTabCreator();
        }

        function handleTabCellRightClick(e, s, c) {
            e.preventDefault();
            tabState[s][c] = '-';
            initTabCreator();
        }

        function scrollTab(direction) {
            const container = document.getElementById('tab-creator-ui');
            const scrollAmount = 150;
            if (direction === 'left') {
                container.scrollLeft -= scrollAmount;
            } else {
                container.scrollLeft += scrollAmount;
            }
        }

        function addTabColumn() {
            for (let s = 0; s < tabState.length; s++) {
                tabState[s].push('-');
            }
            initTabCreator();
        }

        function removeTabColumn() {
            if (tabState[0].length > 1) {
                for (let s = 0; s < tabState.length; s++) {
                    tabState[s].pop();
                }
                initTabCreator();
            }
        }

        function addTabBar() {
            for (let s = 0; s < tabState.length; s++) {
                tabState[s].push('|');
            }
            initTabCreator();
        }

        function clearTabCreator() {
            const cols = tabState[0].length;
            const rows = tabState.length;
            tabState = Array(rows).fill(0).map(() => Array(cols).fill('-'));
            initTabCreator();
        }

        function updateOutput() {
            let tabText = '{start_of_tab}\n';
            const numCols = tabState[0].length;
            const numRows = tabState.length;
            
            // Pre-calculate column widths
            const colWidths = Array(numCols).fill(1);
            for (let c = 0; c < numCols; c++) {
                for (let s = 0; s < numRows; s++) {
                    if (tabState[s][c] !== '-' && tabState[s][c] !== '|' && tabState[s][c].length > colWidths[c]) {
                        colWidths[c] = tabState[s][c].length;
                    }
                }
            }

            for (let s = 0; s < numRows; s++) {
                tabText += (stringLabels[s] || 'S') + '|';
                for (let c = 0; c < numCols; c++) {
                    const val = tabState[s][c];
                    const width = colWidths[c];
                    
                    if (val === '|') {
                        tabText += '|';
                    } else if (val === '-') {
                        tabText += '-'.repeat(width);
                    } else {
                        tabText += val.padEnd(width, '-');
                    }
                }
                tabText += '|\n';
            }
            tabText += '{end_of_tab}';
            document.getElementById('directive-output').innerText = tabText;
            
            renderTabSVG();
        }

        function renderTabSVG() {
            const scale = parseFloat(document.getElementById('tab-scale').value);
            document.getElementById('scale-value').innerText = scale.toFixed(1);
            
            const numCols = tabState[0].length;
            const numRows = tabState.length;
            
            // Pre-calculate column widths
            const colWidths = Array(numCols).fill(1);
            let totalColsWidth = 0;
            for (let c = 0; c < numCols; c++) {
                for (let s = 0; s < numRows; s++) {
                    if (tabState[s][c] !== '-' && tabState[s][c] !== '|' && tabState[s][c].length > colWidths[c]) {
                        colWidths[c] = tabState[s][c].length;
                    }
                }
                totalColsWidth += colWidths[c];
            }

            // BASE dimensions (scale 1.0)
            const charWidth = 14;
            const rowHeight = 24;
            const labelWidth = 30;
            const padding = 20;
            
            const gridLeft = padding + labelWidth;
            const gridRight = gridLeft + charWidth + (totalColsWidth * charWidth); 
            
            const baseWidth = gridRight + padding;
            const baseHeight = numRows * rowHeight + padding * 2;

            // Scaled dimensions for the SVG element
            const displayWidth = baseWidth * scale;
            const displayHeight = baseHeight * scale;

            // Use viewBox for proportional scaling - this is the most reliable method
            let svg = `<svg width="${displayWidth}" height="${displayHeight}" viewBox="0 0 ${baseWidth} ${baseHeight}" xmlns="http://www.w3.org/2000/svg" style="max-width: none; max-height: none; flex-shrink: 0;">`;
            
            const gridTop = padding;

            // Draw horizontal lines (strings)
            for (let s = 0; s < numRows; s++) {
                const y = gridTop + s * rowHeight + rowHeight / 2;
                svg += `<line x1="${gridLeft}" y1="${y}" x2="${gridRight}" y2="${y}" stroke="black" stroke-width="1" />`;
                
                // String Label
                svg += `<text x="${padding + labelWidth / 2}" y="${y + 5}" text-anchor="middle" font-family="Roboto Mono, monospace" font-size="14" font-weight="bold" fill="black">${stringLabels[s] || 'S'}</text>`;
            }

            // Draw content
            let currentX = gridLeft;
            
            // First bar
            for (let s = 0; s < numRows; s++) {
                const top = gridTop + (s === 0 ? rowHeight / 2 : s * rowHeight);
                const bottom = gridTop + (s === numRows - 1 ? s * rowHeight + rowHeight / 2 : (s + 1) * rowHeight);
                svg += `<line x1="${currentX}" y1="${top}" x2="${currentX}" y2="${bottom}" stroke="black" stroke-width="1.5" />`;
            }
            currentX += charWidth;

            for (let c = 0; c < numCols; c++) {
                const width = colWidths[c];
                const colWidthPx = width * charWidth;
                
                for (let s = 0; s < numRows; s++) {
                    const val = tabState[s][c];
                    const y = gridTop + s * rowHeight + rowHeight / 2;
                    
                    if (val === '|') {
                        const top = gridTop + (s === 0 ? rowHeight / 2 : s * rowHeight);
                        const bottom = gridTop + (s === numRows - 1 ? s * rowHeight + rowHeight / 2 : (s + 1) * rowHeight);
                        svg += `<line x1="${currentX + colWidthPx / 2}" y1="${top}" x2="${currentX + colWidthPx / 2}" y2="${bottom}" stroke="black" stroke-width="1.5" />`;
                    } else if (val !== '-') {
                        // Draw white background for the note
                        const textWidth = val.length * charWidth * 0.8;
                        svg += `<rect x="${currentX + (colWidthPx - textWidth) / 2}" y="${y - 8}" width="${textWidth}" height="16" fill="white" />`;
                        svg += `<text x="${currentX + colWidthPx / 2}" y="${y + 5}" text-anchor="middle" font-family="Roboto Mono, monospace" font-size="14" font-weight="bold" fill="black">${val}</text>`;
                    }
                }
                currentX += colWidthPx;
            }

            // Last bar
            for (let s = 0; s < numRows; s++) {
                const top = gridTop + (s === 0 ? rowHeight / 2 : s * rowHeight);
                const bottom = gridTop + (s === numRows - 1 ? s * rowHeight + rowHeight / 2 : (s + 1) * rowHeight);
                svg += `<line x1="${currentX}" y1="${top}" x2="${currentX}" y2="${bottom}" stroke="black" stroke-width="1.5" />`;
            }

            svg += `</svg>`;
            document.getElementById('preview-container').innerHTML = svg;
        }

        function copyOutput() {
            const text = document.getElementById('directive-output').innerText;
            navigator.clipboard.writeText(text).then(() => {
                showToast('ChordPro TAB copied!');
            });
        }

        function downloadOutput() {
            const text = document.getElementById('directive-output').innerText;
            const blob = new Blob([text], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'guitar-tab.txt';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function downloadSVG() {
            const svgData = document.getElementById('preview-container').innerHTML;
            const blob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `tab.svg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function downloadPNG() {
            const svgElement = document.querySelector('#preview-container svg');
            const svgData = new XMLSerializer().serializeToString(svgElement);
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const scale = 4; 
            const width = svgElement.width.baseVal.value;
            const height = svgElement.height.baseVal.value;
            
            canvas.width = width * scale;
            canvas.height = height * scale;
            
            const img = new Image();
            const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
            const url = URL.createObjectURL(svgBlob);
            
            img.onload = function() {
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.scale(scale, scale);
                ctx.drawImage(img, 0, 0);
                
                const pngUrl = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.href = pngUrl;
                link.download = `tab.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };
            img.src = url;
        }

        // Initialize
        initTabCreator();
    </script>
</body>
</html>
